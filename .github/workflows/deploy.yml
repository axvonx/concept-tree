name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache images
        id: cache-images
        uses: actions/cache@v4
        with:
          path: demo/images
          key: images-${{ hashFiles('demo/images.tsv') }}

      - name: Download images
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p demo/images
          grep -v '^\s*#' demo/images.tsv | grep -v '^\s*$' | while IFS=$'\t' read -r url dest; do
            mkdir -p "demo/images/$(dirname "$dest")"
            curl -fsSL --retry 3 --retry-delay 5 \
              -A "concept-tree-ci/1.0 (https://github.com/${{ github.repository }})" \
              "$url" -o "demo/images/$dest"
            sleep 1
          done

      - run: npm test

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
