<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>concept-tree</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <div class="header" id="page-header">
    <button class="hamburger" id="detail-hamburger" aria-label="Menu">☰</button>
    <h1><a href="/">concept-tree</a></h1>
    <span class="hint" id="breadcrumb"></span>
    <div class="header-actions">
      <select class="theme-select" id="theme-select" title="Color scheme">
        <option value="dark">dark</option>
        <option value="midnight">midnight</option>
        <option value="forest">forest</option>
        <option value="warm">warm</option>
        <option value="light">light</option>
      </select>
      <button class="btn" id="bookmark-btn" title="Bookmark this concept" style="font-size:16px;padding:2px 10px">☆</button>
    </div>
  </div>

  <!-- Mobile nav overlay backdrop -->
  <div class="sidebar-overlay" id="detail-nav-overlay"></div>

  <div class="detail-layout">
    <!-- Left nav sidebar: concept hierarchy -->
    <nav class="detail-nav-sidebar" id="detail-nav-sidebar">
      <span class="detail-nav-label">concept map</span>
      <ul class="nav-tree" id="nav-tree"></ul>
    </nav>

    <div class="detail-scroll">
      <div class="detail-content" id="detail-content">
        <p style="color:var(--text3)">loading...</p>
      </div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
  </div>

  <!-- Corner minimap (top-right) -->
  <div class="minimap-tile" id="minimap-tile">
    <div class="minimap-hdr" id="minimap-hdr">
      <span class="minimap-hdr-title">concept map</span>
      <button class="minimap-hdr-btn" id="minimap-toggle" title="Collapse">▾</button>
    </div>
    <div class="minimap-body" id="minimap-body"></div>
  </div>

  <script>
    // Mobile hamburger — toggles detail nav sidebar
    const _ham  = document.getElementById("detail-hamburger");
    const _nav  = document.getElementById("detail-nav-sidebar");
    const _over = document.getElementById("detail-nav-overlay");
    function _openNav()  { _nav.classList.add("open");  _over.classList.add("visible"); }
    function _closeNav() { _nav.classList.remove("open"); _over.classList.remove("visible"); }
    _ham.addEventListener("click",  () => _nav.classList.contains("open") ? _closeNav() : _openNav());
    _over.addEventListener("click", _closeNav);
  </script>

  <script type="module">
    import { parseFrontmatter, buildConceptTree, renderMarkdown, buildHeaderImageHtml } from "/src/markdown.js";
    import { ConceptTree } from "/src/index.js";
    import { TAG_COLORS, THEMES } from "/src/palette.js";
    import { toggleBookmark, isBookmarked, getBookmarks } from "/src/bookmarks.js";

    const params    = new URLSearchParams(window.location.search);
    const conceptId = params.get("id");

    // ── Theme ─────────────────────────────────────────────────────────────────

    const savedTheme = localStorage.getItem("concept-tree-theme") || "dark";
    const themeSelect = document.getElementById("theme-select");
    themeSelect.value = savedTheme;

    // Apply theme CSS variables immediately (before ConceptTree loads)
    function applyThemeCss(name) {
      const t = THEMES[name]?.theme;
      if (!t) return;
      const r = document.documentElement.style;
      r.setProperty("--bg",      t.bg);
      r.setProperty("--bg2",     t.bg2);
      r.setProperty("--text",    t.text);
      r.setProperty("--text2",   t.textDim);
      r.setProperty("--border",  t.border);
      r.setProperty("--border2", t.border);
      r.setProperty("--accent",  t.accent);
      r.setProperty("--accent2", t.accent);
      document.body.style.background = t.bg;
    }
    applyThemeCss(savedTheme);

    themeSelect.addEventListener("change", () => {
      const t = themeSelect.value;
      applyThemeCss(t);
      localStorage.setItem("concept-tree-theme", t);
      if (window._miniTree) window._miniTree.setTheme(t);
    });

    if (!conceptId) {
      document.getElementById("detail-content").innerHTML =
        '<p style="color:var(--danger)">No concept ID specified.</p>';
    }

    // ── Nav tree renderer ─────────────────────────────────────────────────────

    // SVG chevron used in the toggle button (right-pointing, rotates to down when open)
    const CHEVRON_SVG = `<svg viewBox="0 0 10 10" width="8" height="8" aria-hidden="true">
      <polyline points="3,2 7,5 3,8" stroke="currentColor" stroke-width="1.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    /**
     * Render the full concept tree as a collapsible nav list.
     * Tree lines use CSS pseudo-elements (v-line / tee / elbow).
     *
     * @param {Object[]} roots - array of concept tree nodes
     * @param {string}   activeId - ID of currently viewed concept
     * @param {Map}      tagColors
     * @returns {{ el, hoverHighlight }}
     */
    function renderNavTree(roots, activeId, tagColors) {
      const ul = document.getElementById("nav-tree");
      ul.innerHTML = "";
      let _hoveredId = null;

      // collapsed  — nodes whose children are currently hidden
      // clickExpanded — nodes the user explicitly toggled open (persists after minimap hover clears)
      // minimapExpanded — nodes opened by hoverHighlight (auto-closed when hover ends)
      const collapsed = new Set();
      const clickExpanded = new Set();
      const minimapExpanded = new Set();

      // Build active path (ancestors of current concept)
      const activePath = new Set();
      function findPath(node, path) {
        if (node.id === activeId) {
          for (const id of path) activePath.add(id);
          activePath.add(node.id);
          return true;
        }
        for (const child of (node.children || [])) {
          if (findPath(child, [...path, node.id])) return true;
        }
        return false;
      }
      for (const root of roots) findPath(root, []);

      // Flatten tree into rows with connector information
      function flatten(node, depth, ancestorLast) {
        const rows = [];
        const isLast = node._isLast;
        rows.push({ node, depth, ancestorLast: [...ancestorLast], isLast });
        const kids = node.children || [];
        if (kids.length && !collapsed.has(node.id)) {
          for (let i = 0; i < kids.length; i++) {
            kids[i]._isLast = i === kids.length - 1;
            rows.push(...flatten(kids[i], depth + 1, [...ancestorLast, !isLast]));
          }
        }
        return rows;
      }

      // Auto-collapse nodes at depth >= 2 that aren't on the active path.
      // Depth-0 roots and depth-1 nodes are always open.
      function markCollapsed(node, depth) {
        if (depth >= 2 && !activePath.has(node.id)) collapsed.add(node.id);
        for (const child of (node.children || [])) markCollapsed(child, depth + 1);
      }
      for (const root of roots) {
        root._isLast = roots.indexOf(root) === roots.length - 1;
        markCollapsed(root, 0);
      }

      // Shared tooltip for nav row full-name preview (custom, not browser title attr)
      const navTip = document.createElement("div");
      navTip.className = "nav-tooltip";
      // Append to sidebar so it can overflow its scroll area
      ul.closest(".detail-nav-sidebar").appendChild(navTip);

      function showNavTip(li, label) {
        navTip.textContent = label;
        const r = li.getBoundingClientRect();
        const sr = ul.closest(".detail-nav-sidebar").getBoundingClientRect();
        navTip.style.top  = `${r.top}px`;
        navTip.style.left = `${sr.right + 6}px`;
        navTip.classList.add("visible");
      }
      function hideNavTip() { navTip.classList.remove("visible"); }

      function buildRows() {
        ul.innerHTML = "";
        for (let i = 0; i < roots.length; i++) roots[i]._isLast = i === roots.length - 1;
        const rows = [];
        for (const root of roots) rows.push(...flatten(root, 0, []));

        for (const { node, depth, ancestorLast, isLast } of rows) {
          const li = document.createElement("li");
          li.className = `nav-row depth-${depth}${node.id === activeId ? " active" : ""}`;
          li.dataset.id = node.id;

          // Connector cells (one per depth level)
          const connDiv = document.createElement("span");
          connDiv.className = "nav-row-connectors";
          if (depth === 0) {
            const sp = document.createElement("span");
            sp.style.width = "8px";
            connDiv.appendChild(sp);
          } else {
            for (let d = 0; d < depth; d++) {
              const seg = document.createElement("span");
              seg.className = "nav-connector";
              if (d < depth - 1) {
                if (ancestorLast[d + 1]) seg.classList.add("v-line");
              } else {
                seg.classList.add(isLast ? "elbow" : "tee");
              }
              connDiv.appendChild(seg);
            }
          }
          li.appendChild(connDiv);

          // Toggle chevron button — only for nodes with children.
          // Clicking it toggles expand/collapse WITHOUT navigating.
          const hasKids = (node.children || []).length > 0;
          const togBtn = document.createElement("button");
          togBtn.className = "nav-row-toggle-btn" + (hasKids && !collapsed.has(node.id) ? " open" : "");
          togBtn.setAttribute("aria-label", collapsed.has(node.id) ? "Expand" : "Collapse");
          togBtn.innerHTML = hasKids ? CHEVRON_SVG : "";
          const showToggle = hasKids && depth >= 2;
          togBtn.style.visibility = showToggle ? "visible" : "hidden";
          togBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!hasKids) return;
            if (collapsed.has(node.id)) {
              collapsed.delete(node.id);
              clickExpanded.add(node.id);
              minimapExpanded.delete(node.id); // user took ownership
            } else {
              collapsed.add(node.id);
              clickExpanded.delete(node.id);
            }
            buildRows();
          });
          li.appendChild(togBtn);

          // Title span — clicking navigates to the concept
          const titleSpan = document.createElement("span");
          titleSpan.className = "nav-row-title";
          const firstTag = (node.tags || [])[0];
          const col = firstTag ? tagColors.get(firstTag) : null;
          if (col) {
            titleSpan.style.color = col;
            if (node.id !== activeId) titleSpan.style.opacity = "0.6";
          }

          // Bookmark icon — shown only when the concept is bookmarked
          if (isBookmarked(node.id)) {
            const bmStar = document.createElement("span");
            bmStar.className = "nav-bookmark-icon";
            bmStar.textContent = "★";
            const iconColor = col || "var(--accent)";
            bmStar.style.color      = iconColor;
            bmStar.style.textShadow = `0 0 6px ${iconColor}`;
            li.appendChild(bmStar);
          }

          titleSpan.textContent = node.title || node.id;
          li.appendChild(titleSpan);

          // Custom full-name tooltip on hover
          const label = node.title || node.id;
          li.addEventListener("mouseenter", () => showNavTip(li, label));
          li.addEventListener("mouseleave", hideNavTip);

          // Row click → navigate only (toggle arrow handles expand/collapse)
          li.addEventListener("click", (e) => {
            e.stopPropagation();
            if (node.id !== activeId) {
              window.location.href = `/detail.html?id=${encodeURIComponent(node.id)}`;
            }
          });

          ul.appendChild(li);
        }

        // Scroll active row into view
        const activeEl = ul.querySelector(".nav-row.active");
        if (activeEl) setTimeout(() => activeEl.scrollIntoView({ block: "nearest" }), 50);
      }

      buildRows();

      return {
        el: ul,
        rebuild: buildRows,
        hoverHighlight(id) {
          if (_hoveredId === id) return;
          _hoveredId = id;

          // Clear previous hover highlight
          for (const el of ul.querySelectorAll(".nav-row.minimap-hover")) {
            el.classList.remove("minimap-hover");
          }

          if (!id) {
            // Collapse any nodes that were expanded only for the minimap highlight
            let changed = false;
            for (const nid of minimapExpanded) {
              if (!clickExpanded.has(nid)) {
                collapsed.add(nid);
                changed = true;
              }
            }
            minimapExpanded.clear();
            if (changed) buildRows();
            return;
          }

          // Expand ancestors of the target node if they are currently collapsed
          let el = ul.querySelector(`[data-id="${CSS.escape(id)}"]`);
          if (!el) {
            function findAndExpand(node) {
              if (node.id === id) return true;
              for (const child of (node.children || [])) {
                if (findAndExpand(child)) {
                  if (collapsed.has(node.id)) {
                    collapsed.delete(node.id);
                    if (!clickExpanded.has(node.id)) minimapExpanded.add(node.id);
                  }
                  return true;
                }
              }
              return false;
            }
            for (const root of roots) findAndExpand(root);
            buildRows();
            el = ul.querySelector(`[data-id="${CSS.escape(id)}"]`);
          }
          if (el) {
            el.classList.add("minimap-hover");
            el.scrollIntoView({ block: "nearest", behavior: "smooth" });
          }
        },
      };
    }

    // ── Main load ─────────────────────────────────────────────────────────────

    async function load() {
      const allResp    = await fetch("/api/concepts");
      const allSources = await allResp.json();
      const roots      = buildConceptTree(allSources);

      // Compute tag→color mapping (same algorithm as ConceptTree._rebuild)
      const tagCounts = new Map();
      for (const src of Object.values(allSources)) {
        const { meta: m } = parseFrontmatter(src);
        for (const tag of (m.tags || [])) tagCounts.set(tag, (tagCounts.get(tag) || 0) + 1);
      }
      const tagColors = new Map();
      [...tagCounts.entries()]
        .sort((a, b) => b[1] - a[1])
        .forEach(([tag], i) => tagColors.set(tag, TAG_COLORS[i % TAG_COLORS.length]));

      // Render nav tree
      const navTree = renderNavTree(roots, conceptId, tagColors);
      window._navTree = navTree;

      if (!conceptId) return;

      const src = allSources[conceptId];
      if (!src) {
        document.getElementById("detail-content").innerHTML =
          `<p style="color:var(--danger)">Concept "${conceptId}" not found.</p>`;
        return;
      }

      const { meta, body } = parseFrontmatter(src);
      const title = meta.title || conceptId;

      document.title = `${title} — concept-tree`;

      // Bookmark button
      const bookmarkBtn = document.getElementById("bookmark-btn");
      function updateBookmarkBtn() {
        const bmd = isBookmarked(conceptId);
        bookmarkBtn.textContent = bmd ? "★" : "☆";
        bookmarkBtn.title = bmd ? "Remove bookmark" : "Bookmark this concept";
        bookmarkBtn.style.color = bmd ? "#f59e0b" : "";
      }
      updateBookmarkBtn();
      bookmarkBtn.addEventListener("click", () => {
        toggleBookmark(conceptId);
        updateBookmarkBtn();
        // Sync minimap (if already loaded) and nav tree
        if (window._miniTree) window._miniTree.setBookmarks(getBookmarks());
        if (window._navTree) window._navTree.rebuild();
      });

      // Apply node color to header accent
      const firstTag = (meta.tags || [])[0];
      const nodeColor = firstTag ? (tagColors.get(firstTag) || null) : null;
      if (nodeColor) {
        document.documentElement.style.setProperty("--node-color", nodeColor);
      }

      // Breadcrumb — each crumb uses its OWN tag color, not the current node's
      const crumbs = buildBreadcrumb(conceptId, allSources);
      document.getElementById("breadcrumb").innerHTML = crumbs
        .map((c, i) => {
          const { meta: cm } = parseFrontmatter(allSources[c.id] || "---\n---\n");
          const crumbTag   = (cm.tags || [])[0];
          const crumbColor = crumbTag ? (tagColors.get(crumbTag) || "var(--accent)") : "var(--accent)";
          return i < crumbs.length - 1
            ? `<a href="/detail.html?id=${encodeURIComponent(c.id)}" style="color:${crumbColor};text-decoration:none">${c.title}</a>`
            : `<span style="color:${crumbColor}">${c.title}</span>`;
        })
        .join(' <span style="color:var(--text3)">›</span> ');

      // Build concept-title map for wiki link resolution
      const conceptTitles = {};
      for (const [cid, csrc] of Object.entries(allSources)) {
        const { meta: m } = parseFrontmatter(csrc);
        conceptTitles[cid] = m.title || cid;
      }

      // Render content
      const contentEl = document.getElementById("detail-content");
      let html = renderMarkdown(body, { concepts: conceptTitles });

      if (meta.image) {
        html = buildHeaderImageHtml(meta.image, title) + html;
      }

      const childLinks = (meta.links || [])
        .filter(id => allSources[id])
        .map(id => {
          const { meta: cm } = parseFrontmatter(allSources[id]);
          const firstChildTag = (cm.tags || [])[0];
          const color = firstChildTag ? tagColors.get(firstChildTag) : null;
          const style = color ? ` style="border-color:${color};color:${color}"` : "";
          return `<a class="nav-link"${style} href="/detail.html?id=${id}">${cm.title || id}</a>`;
        });
      if (childLinks.length) html += `<div class="detail-nav">${childLinks.join("")}</div>`;

      contentEl.innerHTML = html;

      // Render LaTeX math via KaTeX
      if (typeof renderMathInElement !== "undefined") {
        renderMathInElement(contentEl, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$",  right: "$",  display: false },
          ],
          throwOnError: false,
        });
      }

      // ── Minimap (top-right corner, focused on active node) ─────────────────
      const miniBody = document.getElementById("minimap-body");
      const miniTree = new ConceptTree(miniBody, {
        theme: savedTheme,
        dotMode: true,
        maxZoom: 2.0,
        xStep: 55,
        yStep: 45,
        physics: {
          chargeStrength: -20,
          collideRadius: 2,
          preSettleIterations: 220,
        },
      });
      window._miniTree = miniTree;
      await miniTree.loadMarkdownSources(allSources);
      miniTree.setBookmarks(getBookmarks());
      // Center on active node at a moderate zoom so context is visible
      miniTree.setActiveNode(conceptId);
      const ms = miniTree._state;
      if (ms) {
        const mn = ms.simNodes.find(n => n.id === conceptId);
        const focusK = Math.min((ms.fitParams?.k || 0.5) * 1.5, 1.0);
        ms.tr.k       = focusK;
        ms.trTarget.k = focusK;
        if (mn) {
          ms.tr.tx       = ms.logW / 2 - mn.x * focusK;
          ms.tr.ty       = ms.logH / 2 - mn.y * focusK;
          ms.trTarget.tx = ms.logW / 2 - mn.x * focusK;
          ms.trTarget.ty = ms.logH / 2 - mn.y * focusK;
        }
      }

      miniTree.on("nodeClick", (concept) => {
        window.location.href = `/detail.html?id=${encodeURIComponent(concept.id)}`;
      });

      // ── Minimap tooltip ───────────────────────────────────────────────────
      // IMPORTANT: create the tooltip AFTER loadMarkdownSources, because
      // ConceptTree._rebuild() calls container.innerHTML = "" which would
      // delete any div we put inside minimap-body before initialization.
      const _tip = document.createElement("div");
      _tip.className = "minimap-tooltip";
      miniBody.appendChild(_tip);

      miniTree.on("nodeHover", (concept, _node, sx, sy) => {
        navTree.hoverHighlight(concept.id);
        // Position tooltip within minimap-body coordinate space (canvas fills 100%)
        const bW = miniBody.clientWidth;
        const bH = miniBody.clientHeight;
        _tip.textContent = concept.title || concept.id;
        const approxW = Math.min((_tip.textContent.length * 7) + 20, 220);
        let tx = sx + 12;
        let ty = sy - 32;
        if (tx + approxW > bW - 4) tx = sx - approxW - 12;
        if (ty < 4) ty = sy + 10;
        if (ty + 28 > bH) ty = bH - 32;
        _tip.style.left = `${tx}px`;
        _tip.style.top  = `${ty}px`;
        _tip.classList.add("visible");
      });

      miniTree.on("nodeUnhover", () => {
        _tip.classList.remove("visible");
        navTree.hoverHighlight(null);
      });

      // Collapse toggle
      const tile      = document.getElementById("minimap-tile");
      const toggleBtn = document.getElementById("minimap-toggle");
      document.getElementById("minimap-hdr").addEventListener("click", () => {
        const collapsed = tile.classList.toggle("collapsed");
        toggleBtn.textContent = collapsed ? "▸" : "▾";
      });
    }

    function buildBreadcrumb(id, sources) {
      const parentMap = new Map();
      for (const [pid, src] of Object.entries(sources)) {
        const { meta } = parseFrontmatter(src);
        for (const link of (meta.links || [])) parentMap.set(link, pid);
      }
      const crumbs = [];
      let current = id;
      const seen = new Set();
      while (current && !seen.has(current)) {
        seen.add(current);
        const src = sources[current];
        if (src) {
          const { meta } = parseFrontmatter(src);
          crumbs.unshift({ id: current, title: meta.title || current });
        }
        current = parentMap.get(current);
      }
      return crumbs;
    }

    load().catch(err => {
      console.error(err);
      document.getElementById("detail-content").innerHTML =
        `<p style="color:var(--danger)">Error: ${err.message}</p>`;
    });
  </script>
</body>
</html>
